server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Assets com hash imutáveis — cache de 1 ano no browser
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # F-BUG-01 CORRIGIDO — regra do nginx para proxy_pass com/sem trailing slash:
    #
    # COM trailing slash no proxy_pass: nginx remove o prefixo do location.
    #   location /api/estoque/  →  proxy_pass http://backend:8081/
    #   /api/estoque/v1/produtos  →  http://backend:8081/v1/produtos  ← ERRADO (404 no Go)
    #
    # SEM trailing slash no proxy_pass: nginx preserva o path completo.
    #   location /api/estoque   →  proxy_pass http://backend:8081
    #   /api/estoque/v1/produtos  →  http://backend:8081/api/estoque/v1/produtos ← ainda errado
    #
    # SOLUÇÃO CORRETA: usar rewrite para mapear /api/estoque/* → /api/*
    # Assim /api/estoque/v1/produtos → /api/v1/produtos no backend Go ✅

    location /api/estoque/ {
        rewrite ^/api/estoque/(.*)$ /api/$1 break;
        proxy_pass http://estoque-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # /api/faturamento/v1/notas → /api/v1/notas no faturamento-service ✅
    location /api/faturamento/ {
        rewrite ^/api/faturamento/(.*)$ /api/$1 break;
        proxy_pass http://faturamento-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
    }

    # SPA fallback — F5 em /produtos ou /notas retorna index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}